[general]
framerate = 60
bars = 4
autosens = 1
sensitivity = 80
lower_cutoff_freq = 50
higher_cutoff_freq = 10000

[input]
method = pulse

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
bar_delimiter = 32
frame_delimiter = 10
[smoothing]
monstercat = 1
waves = 0
gravity = 150
noise_reduction = 0.5
integral = 70
